  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/pet.css">

  <!-- TOP NAV -->

    <a href="index.html" class="top-nav-logo">Bites2Books</a>
    <button class="hamburger-btn" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>

    <div class="top-nav-links" id="nav-links">
      <a href="index.html" class="top-nav-item">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a href="explore.html" class="top-nav-item">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Books
      </a>
      <a href="wishlist.html" class="top-nav-item">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        Wishlist
      </a>
      <a href="pet.html" class="top-nav-item">
        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 13v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="22" x2="12" y2="19"/></svg>
        Pet

      <button id="auth-btn" class="top-nav-item">

        FAQ
      </a>
    </div>
  </nav>

  <!-- PET APP CONTAINER -->
  <div class="pet-app-container">
    
    <!-- PET ROOM -->
    <div class="pet-room" id="pet-room">
      
      <!-- Background elements -->
      <div class="room-wall">
        <div class="room-window">
          <div class="window-sky"></div>
          <div class="window-hill1"></div>
          <div class="window-hill2"></div>
        </div>
      </div>
      <div class="room-floor">
        <div class="room-rug"></div>
      </div>

      <!-- Stats Overlay -->
      <div class="pet-stats-panel">
        <div class="stats-header">
          <span class="pet-name">BeatleJuice</span>
          <span class="pet-level">Lvl <span id="level-display">1</span></span>
        </div>
        <div class="pet-xp-bar-bg">
          <div class="pet-xp-fill" id="xp-fill"></div>
        </div>
        <div class="pet-feed-count">Total feeds: <span id="feed-display">0</span></div>
      </div>

      <!-- The Pet (Guinea Pig CSS Art) -->
      <div class="pet-wrapper" id="pet-wrapper">
        <div class="pet-shadow"></div>
        <div class="pet-body">
          <div class="pet-ear left"></div>
          <div class="pet-ear right"></div>
          <div class="pet-eye left"></div>
          <div class="pet-eye right"></div>
          <div class="pet-nose"></div>
          <div class="pet-blush left"></div>
          <div class="pet-blush right"></div>
          <div class="pet-paw left"></div>
          <div class="pet-paw right"></div>
        </div>
        <!-- Speech Bubble (hidden by default) -->
        <div class="pet-speech" id="pet-speech">Yum! 💖</div>
      </div>

    </div>

    <!-- FOOD INVENTORY DRAWER -->
    <div class="food-drawer">
      <div class="drawer-handle"></div>
      <h3 class="drawer-title">Drag food to feed BeatleJuice!</h3>
      <div class="food-grid">
        <div class="food-item" draggable="true" data-type="apple">
          <span class="food-emoji">🍎</span>
        </div>
        <div class="food-item" draggable="true" data-type="carrot">
          <span class="food-emoji">🥕</span>
        </div>
        <div class="food-item" draggable="true" data-type="leaf">
          <span class="food-emoji">🥬</span>
        </div>
        <div class="food-item" draggable="true" data-type="strawberry">
          <span class="food-emoji">🍓</span>
        </div>
        <div class="food-item" draggable="true" data-type="melon">
          <span class="food-emoji">🍈</span>
        </div>
        <div class="food-item" draggable="true" data-type="broccoli">
          <span class="food-emoji">🥦</span>
        </div>
        <div class="food-item" draggable="true" data-type="corn">
          <span class="food-emoji">🌽</span>
        </div>
        <div class="food-item" draggable="true" data-type="cherry">
          <span class="food-emoji">🍒</span>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="js/pet.js"></script>
</body>
</html>
