<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bites4Books - Wishlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/mobile.css">

</head>
<body>
  <nav class="top-nav">
    <a href="index.html" class="top-nav-logo">Bites2Books</a>
    <button class="hamburger-btn" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="top-nav-links" id="nav-links">
      <a href="index.html" class="top-nav-item">Home</a>
      <a href="explore.html" class="top-nav-item">Books</a>
      <a href="wishlist.html" class="top-nav-item">Wishlist</a>
      <button id="auth-btn" class="top-nav-item">Login</button>
      <a href="faq.html" class="top-nav-item">FAQ</a>
    </div>
  </nav>

  <div class="app-container" style="padding-top:60px;">
    <div class="page-container wishlist-page">
      <header>
        <h1>Wishlist</h1>
        <p>Books waiting to be unlocked with your points.</p>
      </header>

      <div id="empty-state" class="empty-state">
        <div class="empty-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="empty-icon"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        </div>
        <h2>Your shelf is empty!</h2>
        <p>Head over to the Explore page to find new stories.</p>
        <a href="explore.html" class="action-button empty-action">Explore Books</a>
      </div>

      <div id="books-grid" style="display:none;flex-direction:column;gap:12px;margin-top:20px;"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="explore.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      <span>Explore</span>
    </a>
    <a href="wishlist.html" class="nav-item active">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      <span>Wishlist</span>
    </a>
  </nav>

  <script type="module">
    import { auth, provider, db, signInWithPopup, signOut, onAuthStateChanged, doc, getDoc, setDoc, updateDoc } from './js/firebase.js';
    import { initNav } from './js/nav.js';
    initNav();

    const authBtn = document.getElementById('auth-btn');
    const booksGrid = document.getElementById('books-grid');
    const emptyState = document.getElementById('empty-state');
    let globalData = { wishlist: [] };
    let currentUser = null;

    function renderWishlist() {
      const list = globalData.wishlist || [];
      if (list.length === 0) {
        emptyState.style.display = 'block';
        booksGrid.style.display = 'none';
        return;
      }
      emptyState.style.display = 'none';
      booksGrid.style.display = 'flex';
      booksGrid.innerHTML = '';
      list.forEach(bookString => {
        const div = document.createElement('div');
        div.style.cssText = 'background:#fff;padding:16px 24px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.05);display:flex;justify-content:space-between;align-items:center;';
        div.innerHTML = `<span style="font-size:1.1rem;color:#db506f;font-weight:500;">${bookString}</span><button style="background:#f5f5f5;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:600;">Remove</button>`;
        div.querySelector('button').addEventListener('click', async () => {
          globalData.wishlist = globalData.wishlist.filter(b => b !== bookString);
          renderWishlist();
          if (currentUser) {
            try { await updateDoc(doc(db, 'points', currentUser.uid), { wishlist: globalData.wishlist }); } catch(e) { console.error(e); }
          }
        });
        booksGrid.appendChild(div);
      });
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        authBtn.textContent = `Logout (${user.displayName.split(' ')[0]})`;
        authBtn.onclick = () => signOut(auth).then(() => location.reload());
        const snap = await getDoc(doc(db, 'points', user.uid));
        if (snap.exists()) {
          const d = snap.data();
          let wl = d.wishlist || [];
          if (wl.length > 0 && typeof wl[0] === 'object') {
            wl = wl.map(b => `${b.title}, ${b.author_name ? (Array.isArray(b.author_name) ? b.author_name.join(' & ') : b.author_name) : 'Unknown'}`);
          }
          globalData.wishlist = wl;
        }
        renderWishlist();
      } else {
        authBtn.textContent = 'Login';
        authBtn.onclick = () => signInWithPopup(auth, provider).catch(e => alert(e.message));
        emptyState.style.display = 'block';
        booksGrid.style.display = 'none';
      }
    });
  </script>
</body>
</html>
